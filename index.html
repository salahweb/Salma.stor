<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر الفطائر والمخبوزات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; -webkit-text-size-adjust: 100%; font-family: 'Cairo', sans-serif; background: #f8fafc; }

        /* شبكة المنتجات */
        .products-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            max-width: 1400px; margin: 0 auto; padding: 0;
        }
        @media (max-width: 767px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-body { padding: 10px !important; }
            .product-title { font-size: 0.85rem !important; }
            .product-price { font-size: 0.9rem !important; }
            .add-to-cart-btn { font-size: 0.75rem !important; padding: 6px 12px !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .product-thumb { height: 180px; }
        }
        @media (min-width: 1025px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .product-thumb { height: 200px; }
        }

        .latest-products-section { background: #0f172a; padding: 40px 20px; direction: rtl; }
        .section-title { text-align: center; font-size: 2rem; font-weight: 700; color: #f8fafc; margin-bottom: 30px; }
        .section-title span { color: #f0c040; }

        .product-card {
            background: #1e293b; border-radius: 16px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05);
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 25px rgba(0,0,0,0.5); border-color: rgba(240,192,64,0.5); }
        .product-thumb { width: 100%; height: 150px; object-fit: cover; background: #334155; cursor: pointer; }
        .product-body { padding: 14px; display: flex; flex-direction: column; flex: 1; }
        .product-title { font-size: 0.9rem; font-weight: 700; color: #f1f5f9; margin: 0 0 6px; }
        .product-price { font-size: 1rem; font-weight: 800; color: #f0c040; margin-bottom: 8px; }
        .old-price { text-decoration: line-through; color: #94a3b8; font-weight: 600; margin-right: 8px; font-size: 0.8rem; }
        .product-sizes { font-size: 0.7rem; color: #94a3b8; margin-bottom: 8px; }
        .product-sizes span { display: inline-block; background: #334155; color: #cbd5e1; padding: 2px 8px; border-radius: 10px; margin: 2px; cursor: pointer; transition: 0.2s; }
        .product-sizes span.selected { background: #f0c040; color: #0f172a; }
        .add-to-cart-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: auto; background: linear-gradient(135deg, #f0c040, #e0a800); color: #0f172a;
            padding: 8px 16px; border-radius: 30px; font-weight: 700; font-size: 0.8rem; border: none;
            cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .add-to-cart-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        /* السلة */
        .cart-icon-btn { position: relative; display: flex; align-items: center; cursor: pointer; padding: 6px; border-radius: 50%; transition: 0.3s; }
        .cart-count { position: absolute; top: -4px; right: -4px; background: #f0c040; color: #0f172a; font-size: 0.7rem; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .cart-sidebar { position: fixed; top: 0; right: 0; width: 320px; height: 100vh; background: #1e293b; box-shadow: -5px 0 25px rgba(0,0,0,0.5); z-index: 2500; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; direction: rtl; padding: 20px; }
        .cart-sidebar.open { transform: translateX(0); }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .cart-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #334155; color: #e2e8f0; font-size: 0.85rem; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-weight: 700; margin-bottom: 2px; }
        .cart-item-meta { font-size: 0.75rem; color: #94a3b8; }
        .cart-item-price { color: #f0c040; font-weight: 700; }
        .cart-item-remove { background: none; border: none; color: #ef4444; font-size: 1.2rem; cursor: pointer; }
        .cart-total { font-weight: 800; font-size: 1.1rem; color: #f0c040; margin: 15px 0; }
        .btn-checkout, .btn-clear { flex: 1; text-align: center; padding: 10px; border-radius: 30px; font-weight: 700; border: none; cursor: pointer; font-size: 0.9rem; }
        .btn-checkout { background: #f0c040; color: #0f172a; }
        .btn-clear { background: #475569; color: #fff; }

        /* المودال */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-box { background: #1e293b; border-radius: 16px; padding: 25px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; color: #f1f5f9; direction: rtl; }
        .modal-box h3 { color: #f0c040; margin: 0 0 20px; }
        .modal-box label { display: block; margin-bottom: 5px; font-weight: 700; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-family: inherit; }
        .modal-box .close-btn { position: absolute; top: 10px; left: 15px; cursor: pointer; font-size: 1.5rem; color: #f0c040; }
        .btn-submit { background: #f0c040; color: #0f172a; padding: 12px 24px; border-radius: 30px; font-weight: 700; border: none; width: 100%; cursor: pointer; font-size: 1rem; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .file-upload-area { border: 2px dashed #334155; border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 15px; cursor: pointer; }
        .file-upload-area input { display: none; }
        .img-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }

        .cart-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #f0c040; padding: 12px 24px; border-radius: 30px; font-weight: 700; z-index: 4000; opacity: 0; transition: 0.3s; pointer-events: none; }
        .cart-toast.show { opacity: 1; bottom: 30px; }
    </style>
</head>
<body>

<!-- Topbar -->
<div style="direction:ltr; background:#0f172a; padding:0 15px; display:flex; align-items:center; justify-content:space-between; height:70px; position:sticky; top:0; z-index:1000; box-shadow:0 4px 15px rgba(0,0,0,0.3);">
    <span style="color:#f0c040; font-weight:800; font-size:1.3rem;">🥐 فطائر</span>
    <div class="cart-icon-btn" onclick="toggleCart()">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#f0c040" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cartCount" style="display:none;">0</span>
    </div>
</div>

<!-- السلة -->
<div id="cartSidebar" class="cart-sidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3 style="color:#f0c040; margin:0;">🛒 السلة</h3>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:1.5rem;">✕</span>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal">الإجمالي: يُحتسب عند الطلب</div>
    <div style="display:flex; gap:10px;">
        <button class="btn-checkout" onclick="openCheckout()">إتمام الطلب</button>
        <button class="btn-clear" onclick="clearCart()">إفراغ</button>
    </div>
</div>

<!-- مودال الدفع -->
<div class="modal-overlay" id="checkoutModal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeCheckout()">✕</span>
        <h3>📋 إتمام الطلب</h3>
        <form onsubmit="submitOrder(event)">
            <label>الاسم *</label><input type="text" id="custName" required>
            <label>الهاتف *</label><input type="tel" id="custPhone" required placeholder="0xxxxxxxxxx" pattern="^(0\d{9}|\d{8,15})$">
            <label>العنوان *</label><input type="text" id="custAddress" required>
            <label>البريد الإلكتروني</label><input type="email" id="custEmail">
            <label>كود الخصم</label><input type="text" id="couponCode" placeholder="أدخل الكود">
            <label>ملاحظات</label><textarea id="custNotes" rows="2"></textarea>
            <label>صورة التحويل</label>
            <div class="file-upload-area" onclick="document.getElementById('paymentImg').click()">
                <span id="fileLabel">انقر لاختيار صورة</span>
                <img id="imgPreview" class="img-preview">
                <input type="file" id="paymentImg" accept="image/*" onchange="previewFile()">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">إرسال الطلب</button>
        </form>
    </div>
</div>

<!-- المنتجات -->
<div class="latest-products-section">
    <h2 class="section-title">🥐 <span>قائمة</span> المنتجات</h2>
    <div class="products-grid" id="productsGrid"></div>
    <p id="productsLoading" style="text-align:center; color:#94a3b8; padding:20px;">جارٍ تحميل المنتجات...</p>
</div>

<div id="cartToast" class="cart-toast"></div>

<script>
    // ========== السلة ==========
    let cart = JSON.parse(localStorage.getItem('fatayerCart')) || [];
    function saveCart() { localStorage.setItem('fatayerCart', JSON.stringify(cart)); updateCartUI(); }

    function updateCartUI() {
        const countEl = document.getElementById('cartCount');
        const itemsEl = document.getElementById('cartItems');
        const count = cart.reduce((s,i) => s + i.qty, 0);
        countEl.style.display = count ? 'flex' : 'none';
        countEl.textContent = count;
        let html = '', total = 0;
        cart.forEach((item, idx) => {
            total += item.price * item.qty;
            html += `<div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-title">${item.title}</div>
                    <div class="cart-item-meta">المقاس: ${item.size || 'قياسي'} | ${item.price} ج.س × ${item.qty}</div>
                    <div class="cart-item-price">${item.price * item.qty} ج.س</div>
                </div>
                <button class="cart-item-remove" onclick="removeItem(${idx})">✕</button>
            </div>`;
        });
        itemsEl.innerHTML = html || '<p style="color:#94a3b8;">السلة فارغة</p>';
        document.getElementById('cartTotal').textContent = `الإجمالي: ${total} ج.س`;
    }

    window.addToCart = (sku, title, price, size) => {
        const exist = cart.find(i => i.sku === sku && i.size === size);
        exist ? exist.qty++ : cart.push({ sku, title, price, size: size || 'قياسي', qty: 1 });
        saveCart();
        showToast(`✔️ تمت إضافة "${title}"`);
    };

    window.removeItem = (idx) => { cart.splice(idx,1); saveCart(); };
    window.clearCart = () => { cart = []; saveCart(); };

    function showToast(msg) {
        const t = document.getElementById('cartToast'); t.textContent = msg; t.classList.add('show');
        clearTimeout(t.hideTO); t.hideTO = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }
    function openCheckout() {
        if (cart.length === 0) { showToast('السلة فارغة'); return; }
        document.getElementById('checkoutModal').classList.add('active');
    }
    function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }

    function previewFile() {
        const f = document.getElementById('paymentImg').files[0];
        document.getElementById('fileLabel').textContent = f ? f.name : 'انقر لاختيار صورة';
        const preview = document.getElementById('imgPreview');
        if (f) { const r = new FileReader(); r.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; }; r.readAsDataURL(f); }
        else preview.style.display = 'none';
    }

    // ========== إرسال الطلب ==========
    const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec'; // ⚠️ استبدل

    async function submitOrder(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const orig = btn.textContent;
        btn.textContent = '⏳ جاري الإرسال...'; btn.disabled = true;

        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        const email = document.getElementById('custEmail').value.trim();
        const coupon = document.getElementById('couponCode').value.trim();
        const notes = document.getElementById('custNotes').value.trim();
        const fileInput = document.getElementById('paymentImg');
        let imageBase64 = null;
        if (fileInput.files.length > 0) {
            if (fileInput.files[0].size > 2*1024*1024) { showToast('❌ حجم الصورة كبير جداً'); btn.textContent = orig; btn.disabled = false; return; }
            imageBase64 = await new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(fileInput.files[0]); });
        }

        const order = {
            name, phone, address, email, coupon, notes,
            cart: cart.map(i => ({ sku: i.sku, size: i.size, qty: i.qty })),
            image: imageBase64
        };

        try {
            const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(order), headers:{'Content-Type':'text/plain;charset=utf-8'} });
            const result = JSON.parse(await res.text());
            if (result.success) {
                showToast(`✅ تم الطلب! الرقم: ${result.orderId}`);
                clearCart(); closeCheckout(); document.querySelector('form').reset();
                document.getElementById('fileLabel').textContent = 'انقر لاختيار صورة';
                document.getElementById('imgPreview').style.display = 'none';
            } else showToast('❌ ' + (result.error || 'فشل'));
        } catch { showToast('⚠️ خطأ في الشبكة'); }
        btn.textContent = orig; btn.disabled = false;
    }

    // ========== جلب المنتجات ==========
    (function() {
        const myBlogDomain = 'yourblog.blogspot.com'; // ⚠️ استبدل
        const host = window.location.hostname;
        const blogUrl = (host.includes('localhost')||host==='127.0.0.1'||host.includes('github.io')) ? myBlogDomain : host;
        const feedUrl = `https://${blogUrl.replace(/^https?:\/\//,'')}/feeds/posts/default?alt=json-in-script&callback=handleProducts&max-results=200`;
        window.handleProducts = function(data) {
            document.getElementById('productsLoading').style.display = 'none';
            const entries = data.feed.entry || [];
            let html = '';
            entries.forEach(e => {
                const title = e.title.$t;
                const link = e.link.find(l=>l.rel==='alternate').href;
                const raw = (e.content?e.content.$t:e.summary?e.summary.$t:'').replace(/<[^>]+>/g, ' ');
                
                // استخراج مرن
                const sku = (raw.match(/sku\/\s*([^\s<]+)/i)||[])[1] || '';
                const priceMatch = raw.match(/price\/\s*[^\d]*([\d,]+)/i);
                const price = priceMatch ? parseInt(priceMatch[1].replace(/,/g,'')) : null;
                const offMatch = raw.match(/off\/\s*([^\s<]+)/i);
                let finalPrice = price, oldPriceHtml = '';
                if (price && offMatch) {
                    const offVal = offMatch[1].trim();
                    if (offVal.includes('%')) {
                        const pct = parseInt(offVal);
                        finalPrice = Math.round(price * (1 - pct/100));
                    } else {
                        const amt = parseInt(offVal.replace(/[^0-9]/g,''));
                        if (amt) finalPrice = price - amt;
                    }
                    oldPriceHtml = `<span class="old-price">${price} ج.س</span>`;
                }
                const sizeMatch = raw.match(/size\/\s*([^<\n\r]+)/i);
                const sizes = sizeMatch ? sizeMatch[1].split(/[\/,]/).map(s=>s.trim()).filter(Boolean) : [];
                const imgMatch = raw.match(/<img[^>]+src=["']([^"']+)["'][^>]*>/i) || (e.content?e.content.$t:'').match(/<img[^>]+src=["']([^"']+)["'][^>]*>/i);
                const image = imgMatch ? imgMatch[1] : 'https://placehold.co/400x300/1e293b/64748b';

                const sizesHtml = sizes.length ? `<div class="product-sizes">${sizes.map(s => `<span onclick="selectSize(this,'${s}','${sku}')">${s}</span>`).join('')}</div>` : '';
                html += `<div class="product-card">
                    <a href="${link}" target="_blank"><img class="product-thumb" src="${image}" onerror="this.src='https://placehold.co/400x300/1e293b/64748b'"></a>
                    <div class="product-body">
                        <h3 class="product-title">${title}</h3>
                        <div class="product-price">${oldPriceHtml} ${finalPrice||'?'} ج.س</div>
                        ${sizesHtml}
                        <button class="add-to-cart-btn" data-sku="${sku}" data-title="${title.replace(/"/g,'&quot;')}" data-price="${finalPrice||0}" data-size="" onclick="addFromButton(this)" ${!finalPrice?'disabled':''}>${finalPrice?'🛒 أضف للسلة':'🔒 غير متاح'}</button>
                    </div>
                </div>`;
            });
            document.getElementById('productsGrid').innerHTML = html;
        };
        const s = document.createElement('script'); s.src=feedUrl; s.async=true; document.body.appendChild(s);
    })();

    // اختيار المقاس
    window.selectSize = function(el, size, sku) {
        el.parentElement.querySelectorAll('span').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        const card = el.closest('.product-card');
        card.querySelector('.add-to-cart-btn').setAttribute('data-size', size);
    };

    window.addFromButton = function(btn) {
        const sku = btn.getAttribute('data-sku');
        const title = btn.getAttribute('data-title');
        const price = parseInt(btn.getAttribute('data-price'));
        const size = btn.getAttribute('data-size') || 'قياسي';
        addToCart(sku, title, price, size);
    };

    updateCartUI();
</script>
</body>
</html>
