<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجري | منتجات وسلة احترافية</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; overflow-x: hidden;
            -webkit-text-size-adjust: 100%; font-family: 'Cairo', sans-serif; background: #f8fafc;
        }

        /* شبكة المنتجات */
        .products-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            max-width: 1400px; margin: 0 auto; padding: 0; box-sizing: border-box;
        }
        @media (max-width: 767px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-body { padding: 10px !important; }
            .product-title { font-size: 0.9rem !important; }
            .product-price { font-size: 0.95rem !important; }
            .add-to-cart-btn { font-size: 0.75rem !important; padding: 6px 12px !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .product-thumb { height: 180px; }
            .product-title { font-size: 1rem; }
            .product-price { font-size: 1.1rem; }
            .add-to-cart-btn { font-size: 0.85rem; }
        }
        @media (min-width: 1025px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .product-thumb { height: 200px; }
            .product-title { font-size: 1.05rem; }
            .product-price { font-size: 1.2rem; }
            .add-to-cart-btn { font-size: 0.9rem; }
        }

        .latest-products-section { background: #0f172a; padding: 40px 20px; direction: rtl; }
        .section-title { text-align: center; font-size: 2rem; font-weight: 700; color: #f8fafc; margin-bottom: 30px; }
        .section-title span { color: #f0c040; }

        .product-card {
            background: #1e293b; border-radius: 16px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 25px rgba(0,0,0,0.5); border-color: rgba(240,192,64,0.5); }
        .product-badge {
            position: absolute; top: 12px; right: 12px; background: #f0c040; color: #0f172a;
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; z-index: 2;
        }
        .product-thumb { width: 100%; height: 150px; object-fit: cover; background: #334155; }
        .product-body { padding: 14px; display: flex; flex-direction: column; flex: 1; }
        .product-title { font-size: 0.9rem; font-weight: 700; color: #f1f5f9; margin: 0 0 6px; line-height: 1.4; }
        .product-price { font-size: 1rem; font-weight: 800; color: #f0c040; margin-bottom: 6px; }
        .old-price { text-decoration: line-through; color: #94a3b8; font-weight: 600; margin-right: 8px; font-size: 0.85rem; }
        .product-meta { font-size: 0.75rem; color: #94a3b8; margin-bottom: 10px; }
        .add-to-cart-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: auto; background: linear-gradient(135deg, #f0c040, #e0a800); color: #0f172a;
            padding: 8px 16px; border-radius: 30px; font-weight: 700; font-size: 0.8rem; border: none;
            cursor: pointer; transition: transform 0.2s, opacity 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .add-to-cart-btn:hover { transform: scale(1.03); opacity: 0.9; }

        .products-loading { text-align: center; color: #94a3b8; font-size: 1rem; padding: 20px; }

        /* شريط الأخبار */
        .news-bar { background: linear-gradient(135deg, #0f172a, #1e293b); border-top: 1px solid rgba(240,192,64,0.3); border-bottom: 1px solid rgba(240,192,64,0.3); height: 60px; overflow: hidden; position: relative; }
        .news-container { position: relative; width: 100%; height: 100%; }
        .news-item { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 12px; opacity: 0; transform: translateY(15px); transition: 0.6s; pointer-events: none; }
        .news-item.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .news-item a { color: #fff; text-decoration: none; font-size: 16px; font-weight: 700; }
        .news-item a:hover { color: #f0c040; }
        .news-badge { background: #f0c040; color: #0f172a; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; }

        /* أيقونة السلة في الـ topbar */
        .cart-icon-btn { position: relative; display: flex; align-items: center; cursor: pointer; padding: 6px; border-radius: 50%; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .cart-icon-btn:hover { background: rgba(255,255,255,0.1); }
        .cart-count {
            position: absolute; top: -4px; right: -4px; background: #f0c040; color: #0f172a;
            font-size: 0.7rem; font-weight: 800; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* سايدبار السلة */
        .cart-sidebar {
            position: fixed; top: 0; right: 0; width: 320px; height: 100vh; background: #1e293b;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5); z-index: 2500; transform: translateX(100%);
            transition: transform 0.3s ease; display: flex; flex-direction: column; direction: rtl; padding: 20px;
            box-sizing: border-box;
        }
        .cart-sidebar.open { transform: translateX(0); }
        .cart-sidebar h3 { color: #f0c040; font-size: 1.2rem; margin-top: 0; margin-bottom: 15px; }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .cart-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 0;
            border-bottom: 1px solid #334155; color: #e2e8f0; font-size: 0.9rem;
        }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-weight: 700; margin-bottom: 4px; }
        .cart-item-price { color: #f0c040; font-weight: 700; }
        .cart-item-remove {
            background: none; border: none; color: #ef4444; font-size: 1.2rem; cursor: pointer;
            padding: 4px 8px; border-radius: 8px; transition: 0.2s;
        }
        .cart-item-remove:hover { background: rgba(239,68,68,0.1); }
        .cart-total { font-weight: 800; font-size: 1.1rem; color: #f0c040; margin-bottom: 10px; text-align: left; }
        .cart-actions { display: flex; gap: 10px; }
        .cart-actions button, .cart-actions a {
            flex: 1; text-align: center; padding: 10px; border-radius: 30px; font-weight: 700;
            border: none; cursor: pointer; text-decoration: none; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-checkout { background: #f0c040; color: #0f172a; }
        .btn-checkout:hover { background: #e0a800; }
        .btn-clear { background: #475569; color: #fff; }
        .btn-clear:hover { background: #64748b; }

        /* إشعار Toast */
        .cart-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #f0c040; padding: 12px 24px; border-radius: 30px;
            font-weight: 700; box-shadow: 0 8px 20px rgba(0,0,0,0.4); z-index: 3000;
            opacity: 0; transition: opacity 0.3s, bottom 0.3s; pointer-events: none; white-space: nowrap;
        }
        .cart-toast.show { opacity: 1; bottom: 30px; }

        @media (max-width: 480px) {
            .custom-sidebar, .cart-sidebar { width: 85% !important; }
        }
    </style>
</head>
<body>

<!-- ==================== TOPBAR ==================== -->
<div id="topbar" style="direction:ltr; background:#0f172a; padding:0 15px; display:flex; align-items:center; justify-content:space-between; height:70px; position:sticky; top:0; z-index:1000; box-shadow:0 4px 15px rgba(0,0,0,0.3); box-sizing:border-box;">

    <!-- زر هامبرجر يسار -->
    <div onclick="toggleSidebar('left')" style="cursor:pointer; padding:8px; border-radius:50%; transition:0.3s; display:flex; align-items:center;"
         onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>

    <!-- الشعار -->
    <div style="flex:1; display:flex; justify-content:center; max-width:60%;">
        <img src="https://placehold.co/120x40/ffffff/0f172a?text=LOGO" alt="شعار" style="height:40px; max-width:100%; object-fit:contain;">
    </div>

    <!-- أيقونة السلة (تظهر على يمين الشعار في LTR) -->
    <div class="cart-icon-btn" onclick="toggleCart()" style="margin-right:8px;">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#f0c040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-count" id="cartCount" style="display:none;">0</span>
    </div>

    <!-- زر هامبرجر يمين -->
    <div onclick="toggleSidebar('right')" style="cursor:pointer; padding:8px; border-radius:50%; transition:0.3s; display:flex; align-items:center;"
         onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>
</div>

<!-- ==================== سايدبار أيمن (معلومات) ==================== -->
<div id="sidebar-right" class="custom-sidebar" style="direction:rtl; position:fixed; top:0; right:0; width:300px; height:100vh; background:#1e293b; box-shadow:-5px 0 20px rgba(0,0,0,0.5); z-index:2000; transform:translateX(100%); transition:transform 0.3s ease; padding:20px; overflow-y:auto; display:flex; flex-direction:column; box-sizing:border-box;">
    <div onclick="toggleSidebar('right')" style="text-align:left; cursor:pointer; margin-bottom:20px;">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <a href="https://example.com" target="_blank" style="display:flex; align-items:center; gap:12px; padding:12px; text-decoration:none; color:#cbd5e1; border-radius:8px; margin-bottom:8px; font-weight:700;">🏠 الرئيسية</a>
    <a href="https://example.com/works" target="_blank" style="display:flex; align-items:center; gap:12px; padding:12px; text-decoration:none; color:#cbd5e1; border-radius:8px; margin-bottom:8px; font-weight:700;">💼 أعمالي</a>
    <div style="margin-top:auto; border-top:1px solid #334155; padding-top:15px;">
        <h3 style="color:#f0c040; font-size:0.95rem; margin:0 0 12px; text-align:center;">تابعنا</h3>
        <div style="display:flex; gap:12px; justify-content:center;">
            <a href="https://wa.me/966551693175" target="_blank" style="display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; background:#25D366; border-radius:50%;"><svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M17.472 14.382..."/></svg></a>
            <a href="https://facebook.com/yourpage" target="_blank" style="display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; background:#1877F2; border-radius:50%;"><svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M24 12.073..."/></svg></a>
        </div>
    </div>
</div>

<!-- سايدبار أيسر -->
<div id="sidebar-left" class="custom-sidebar" style="direction:rtl; position:fixed; top:0; left:0; width:280px; height:100vh; background:#1e293b; box-shadow:5px 0 20px rgba(0,0,0,0.5); z-index:2000; transform:translateX(-100%); transition:transform 0.3s ease; padding:20px; overflow-y:auto; box-sizing:border-box;">
    <div onclick="toggleSidebar('left')" style="text-align:right; cursor:pointer; margin-bottom:30px;">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <a href="https://example.com/offers" target="_blank" style="display:flex; align-items:center; gap:12px; padding:12px; text-decoration:none; color:#cbd5e1; border-radius:8px; margin-bottom:10px; font-weight:700;">🔥 عروض</a>
    <a href="https://example.com/new" target="_blank" style="display:flex; align-items:center; gap:12px; padding:12px; text-decoration:none; color:#cbd5e1; border-radius:8px; margin-bottom:10px; font-weight:700;">⭐ جديد</a>
</div>

<!-- overlay -->
<div id="overlay" onclick="closeSidebars()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1500; transition:0.3s;"></div>

<!-- ==================== سايدبار السلة ==================== -->
<div id="cartSidebar" class="cart-sidebar" style="padding-bottom:40px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0;">🛒 سلة التسوق</h3>
        <div onclick="toggleCart()" style="cursor:pointer;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#f0c040" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal">الإجمالي: 0 ريال</div>
    <div class="cart-actions">
        <a href="https://wa.me/966551693175" target="_blank" class="btn-checkout">إتمام الطلب واتساب</a>
        <button class="btn-clear" onclick="clearCart()">إفراغ السلة</button>
    </div>
</div>

<!-- شريط الأخبار -->
<div class="news-bar">
    <div class="news-container">
        <div class="news-item active"><span class="news-badge">عرض</span><a href="#">🚀 خصم 50% على التطبيقات</a></div>
        <div class="news-item"><span class="news-badge">جديد</span><a href="#">📦 منتجات جديدة</a></div>
    </div>
</div>

<!-- ==================== قسم المنتجات ==================== -->
<div class="latest-products-section">
    <h2 class="section-title">🛒 <span>أحدث</span> المنتجات</h2>
    <div class="products-grid" id="productsGrid"></div>
    <div class="products-loading" id="productsLoading">جارٍ تحميل المنتجات...</div>
</div>

<!-- إشعار Toast -->
<div id="cartToast" class="cart-toast">✔️ تمت الإضافة إلى السلة</div>

<script>
    // ----- دوال السايدبار -----
    function toggleSidebar(side) {
        const r = document.getElementById('sidebar-right');
        const l = document.getElementById('sidebar-left');
        const o = document.getElementById('overlay');
        if (side === 'right') {
            if (r.style.transform === 'translateX(0px)') { r.style.transform = 'translateX(100%)'; o.style.display = 'none'; }
            else { r.style.transform = 'translateX(0px)'; l.style.transform = 'translateX(-100%)'; o.style.display = 'block'; }
        } else if (side === 'left') {
            if (l.style.transform === 'translateX(0px)') { l.style.transform = 'translateX(-100%)'; o.style.display = 'none'; }
            else { l.style.transform = 'translateX(0px)'; r.style.transform = 'translateX(100%)'; o.style.display = 'block'; }
        }
    }
    function closeSidebars() {
        document.getElementById('sidebar-right').style.transform = 'translateX(100%)';
        document.getElementById('sidebar-left').style.transform = 'translateX(-100%)';
        document.getElementById('overlay').style.display = 'none';
    }

    // ----- سلة التسوق -----
    let cart = JSON.parse(localStorage.getItem('myCart')) || [];

    function saveCart() { localStorage.setItem('myCart', JSON.stringify(cart)); updateCartUI(); }
    function updateCartUI() {
        const countEl = document.getElementById('cartCount');
        const itemsEl = document.getElementById('cartItems');
        const totalEl = document.getElementById('cartTotal');
        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        countEl.style.display = count > 0 ? 'flex' : 'none';
        countEl.textContent = count;
        let html = '';
        let total = 0;
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.title}</div>
                        <div class="cart-item-price">${item.price} ريال × ${item.qty}</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeCartItem(${index})">✕</button>
                </div>
            `;
        });
        itemsEl.innerHTML = html || '<p style="color:#94a3b8; text-align:center;">السلة فارغة</p>';
        totalEl.textContent = `الإجمالي: ${total} ريال`;
    }
    window.addToCart = function(title, price) {
        // التأكد من أنه سعر رقمي
        const numPrice = parseInt(price, 10);
        if (isNaN(numPrice)) {
            alert('سعر المنتج غير صحيح');
            return;
        }
        const existing = cart.find(item => item.title === title && item.price === numPrice);
        if (existing) existing.qty += 1;
        else cart.push({ title, price: numPrice, qty: 1 });
        saveCart();
        showToast(`✔️ تمت إضافة "${title}" إلى السلة`);
    };
    window.removeCartItem = function(index) {
        cart.splice(index, 1);
        saveCart();
    };
    window.clearCart = function() {
        cart = [];
        saveCart();
    };

    function showToast(msg) {
        const toast = document.getElementById('cartToast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast.hideTimeout);
        toast.hideTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function toggleCart() {
        const sidebar = document.getElementById('cartSidebar');
        sidebar.classList.toggle('open');
    }

    // ----- شريط الأخبار -----
    (function() {
        const items = document.querySelectorAll('.news-item');
        let current = 0;
        setInterval(() => {
            if (items.length === 0) return;
            items[current].classList.remove('active');
            current = (current + 1) % items.length;
            items[current].classList.add('active');
        }, 5000);
    })();

    // ----- جلب المنتجات من بلوجر -----
    (function() {
        const myBlogDomain = '055159salah.blogspot.com'; // ⚠️ استبدل باسم مدونتك
        const currentHost = window.location.hostname;
        const blogUrl = (currentHost.includes('localhost') || currentHost === '127.0.0.1' || currentHost.includes('github.io'))
                        ? myBlogDomain : currentHost;
        const maxPosts = 200;
        const cleanBlogUrl = blogUrl.replace(/^(https?:\/\/)?/, '');
        const feedUrl = `https://${cleanBlogUrl}/feeds/posts/default?alt=json-in-script&callback=handleProducts&max-results=${maxPosts}`;
        const grid = document.getElementById('productsGrid');
        const loadingMsg = document.getElementById('productsLoading');

        function extractFirstImage(html) {
            const match = html.match(/<img[^>]+src=["']([^"']+)["'][^>]*>/i);
            return match ? match[1] : 'https://placehold.co/400x300/1e293b/64748b?text=No+Image';
        }

        // استخراج السعر من HTML: price/ جنية1000
        function extractPrice(html) {
            const priceMatch = html.match(/price\/\s*([^<]+)/i);
            if (!priceMatch) return null;
            let raw = priceMatch[1].trim(); // "جنية1000" أو "1000 جنيه"
            const nums = raw.match(/[\d,]+/);
            if (!nums) return null;
            return parseInt(nums[0].replace(/,/g, ''), 10);
        }

        // استخراج الخصم: off/-10%
        function extractDiscount(html) {
            const offMatch = html.match(/off\/\s*([^<]+)/i);
            if (!offMatch) return null;
            const raw = offMatch[1].trim(); // "-10%" أو "10%"
            const num = raw.match(/(\d+)/);
            return num ? parseInt(num[1]) : null;
        }

        // استخراج المقاسات: size/10/20/3
        function extractSize(html) {
            const sizeMatch = html.match(/size\/\s*([^<]+)/i);
            if (!sizeMatch) return null;
            return sizeMatch[1].trim();
        }

        window.handleProducts = function(data) {
            if (loadingMsg) loadingMsg.style.display = 'none';
            const entries = data.feed.entry || [];
            if (entries.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#94a3b8;">لا توجد منتجات.</p>';
                return;
            }
            let html = '';
            entries.forEach(entry => {
                const title = entry.title.$t;
                const link = entry.link.find(l => l.rel === 'alternate').href;
                const content = entry.content ? entry.content.$t : (entry.summary ? entry.summary.$t : '');
                const image = extractFirstImage(content);
                const originalPrice = extractPrice(content);
                const discount = extractDiscount(content);
                const size = extractSize(content);
                let finalPrice = originalPrice;
                let priceDisplay = 'السعر عند الطلب';
                let oldPriceHtml = '';

                if (originalPrice !== null) {
                    finalPrice = originalPrice;
                    if (discount !== null && discount > 0) {
                        finalPrice = Math.round(originalPrice * (1 - discount / 100));
                        oldPriceHtml = `<span class="old-price">${originalPrice} ريال</span>`;
                    }
                    priceDisplay = `${finalPrice} ريال`;
                }

                html += `
                    <div class="product-card">
                        <img class="product-thumb" src="${image}" alt="${title}" loading="lazy"
                             onerror="this.src='https://placehold.co/400x300/1e293b/64748b?text=No+Image'">
                        <div class="product-body">
                            <h3 class="product-title">${title}</h3>
                            <div class="product-price">${oldPriceHtml} ${priceDisplay}</div>
                            ${size ? `<div class="product-meta">📏 المقاس: ${size}</div>` : ''}
                            <button class="add-to-cart-btn" onclick="addToCart('${title.replace(/'/g, "\\'")}', '${finalPrice !== null ? finalPrice : 0}')">
                                🛒 أضف للسلة
                            </button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        };

        const script = document.createElement('script');
        script.src = feedUrl;
        script.async = true;
        document.body.appendChild(script);
        script.onerror = () => { if (loadingMsg) loadingMsg.innerHTML = '❌ فشل تحميل المنتجات.'; };
    })();

    // تحديث واجهة السلة عند التحميل
    updateCartUI();
</script>

</body>
             </html>
